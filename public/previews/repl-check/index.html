<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Hop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <div>
          <p>AI preview build</p>
          <h1>Sky Hop</h1>
          <span>jump platforms, chain points</span>
        </div>
        <button id="restartButton" type="button">Restart</button>
      </header>
      <canvas id="gameCanvas" width="960" height="540"></canvas>
      <footer>
        <span>Score <strong id="scoreValue">0</strong></span>
        <span>Best <strong id="bestValue">0</strong></span>
        <span id="hintValue">Press Space/ArrowUp or tap to jump.</span>
      </footer>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
